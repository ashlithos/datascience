# Publish the static FlowDash DS-agent preview (web/index.html) to GitHub Pages.
# Self-enables Pages (enablement: true), so no manual settings toggle is needed.
name: Deploy preview to Pages

on:
  push:
    branches: [main, claude/ds-agent-demo-49c5ob]
    paths: [web/**, .github/workflows/pages.yml]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Assemble site (index.html at root)
        run: |
          mkdir -p _site
          cp web/index.html _site/index.html
      - name: Configure Pages (auto-enable)
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

# (trigger: redeploy after Pages was enabled)
